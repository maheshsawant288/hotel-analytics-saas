name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  enforce-branch-flow:
    name: Enforce Branch Flow
    runs-on: ubuntu-latest
    steps:
      - name: Block direct feature → main merges
        if: github.base_ref == 'main' && github.head_ref != 'staging'
        run: |
          echo "❌ PRs to main must come from 'staging' only."
          echo "   Source branch: ${{ github.head_ref }}"
          echo "   Merge via staging first: feature/* → staging → main"
          exit 1


  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    # Uses 'production' env secrets for PRs targeting main, 'staging' for PRs targeting staging
    environment: ${{ github.base_ref == 'main' && 'production' || 'staging' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
